componentsDefinition:
  backend:
    description: "Core backend services (API, controllers, composition engine)"
    steps:
      - create-jwt-sign-key
      - install-authn
      - extract-authn-nodeport-port
      - install-snowplow
      - extract-snowplow-nodeport-port

  eventstack:
    description: "Event streaming and storage stack (EventRouter + EventSSE)"
    steps:
      - install-eventrouter
      - install-eventsse-etcd
      - install-eventsse
      - extract-eventsse-nodeport-port
      - extract-eventsse-internal-port
      - install-sweeper

  frontend:
    description: "Web UI and platform dashboard"
    steps:
      - install-frontend

  portal-defaults:
    description: "Portal starter template"
    steps:
      - install-composable-portal-starter

  composable-operations:
    description: "Core composition and orchestration engine"
    steps:
      - install-core-provider

  operator-generator:
    description: "OpenAPI schema generation provider"
    steps:
      - install-oasgen-provider

  finops:
    description: "Cost management and FinOps analytics (optional) and OPA Gatekeeper for policy enforcement (optional)"
    steps:
      - install-finops-cratedb
      - install-finops-operator-exporter
      - install-finops-operator-focus
      - install-finops-database-handler
      - extract-finops-database-handler-internal-port
      - install-finops-database-handler-uploader
      - install-finops-notebooks
      - install-finops-composition-definition-parser
      - install-finops-operator-scraper
      - install-opa
